<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>NuMe — Carta Digital</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
/* NuMe — hi-fi urban / fluo */
:root {
  --bg: #f3efe8;
  --bg-2: #e9e3d6;
  --ink: #0d0d0c;
  --ink-soft: #4a4845;
  --ink-faint: #8a857a;
  --line: #d6cfbf;
  --fluo: #d8ff3a;
  --fluo-deep: #b9e500;
  --coral: #ff5a3c;
  --paper-card: #ffffff;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0;
  padding: 0;
  background: #1a1916;
  color: var(--ink);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
}

/* page = stage that centers the device */
.stage {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
  background:
    radial-gradient(60% 60% at 50% 30%, rgba(216,255,58,0.06), transparent 70%),
    #16140f;
}

/* Within phone screen */
.app {
  width: 100%;
  height: 100%;
  background: var(--bg);
  color: var(--ink);
  display: flex;
  flex-direction: column;
  font-family: 'Inter', system-ui, sans-serif;
  position: relative;
  overflow: hidden;
}

.scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}
.scroll::-webkit-scrollbar { width: 0; }

/* Typography */
.display {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 0.95;
}
.mono {
  font-family: 'JetBrains Mono', monospace;
  font-feature-settings: 'tnum';
}

/* Logo wordmark */
.logo {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 28px;
  letter-spacing: -0.04em;
  line-height: 1;
  display: inline-flex;
  align-items: center;
}
.logo .me {
  background: var(--fluo);
  color: var(--ink);
  padding: 0 6px;
  margin-left: 1px;
  border-radius: 4px;
}
.logo.lg { font-size: 44px; }
.logo.xl { font-size: 56px; }

/* Restaurant lockup (mark + name) — used in topbars */
.restaurant-lockup {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}
.restaurant-lockup-text {
  display: flex;
  flex-direction: column;
  line-height: 1;
  min-width: 0;
}
.restaurant-lockup-text .rn {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 17px;
  letter-spacing: -0.02em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 180px;
}

/* "powered by NuMe" subtle attribution */
.powered-by {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--ink-faint);
  text-transform: lowercase;
  padding: 4px 8px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--paper-card);
}
.powered-by .logo { font-size: 14px; }
.powered-by .logo .me { padding: 0 3px; border-radius: 2px; }

/* Top bar */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 12px;
}
.icon-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: 1.5px solid var(--ink);
  background: transparent;
  color: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: transform .15s, background .15s;
}
.icon-btn:active { transform: scale(0.92); }
.icon-btn.solid {
  background: var(--ink);
  color: var(--bg);
}
.icon-btn.fluo {
  background: var(--fluo);
  border-color: var(--fluo);
}
.icon-btn .dot {
  width: 8px; height: 8px;
  background: var(--coral);
  border-radius: 50%;
  position: absolute;
  top: 6px; right: 6px;
}
.icon-btn { position: relative; }

/* Search input */
.search {
  margin: 4px 20px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--paper-card);
  border: 1.5px solid var(--ink);
  border-radius: 999px;
  padding: 11px 16px;
}
.search input {
  border: 0;
  background: transparent;
  outline: none;
  flex: 1;
  font: inherit;
  font-size: 14px;
  color: var(--ink);
  min-width: 0;
}
.search input::placeholder { color: var(--ink-faint); }

/* Promo carousel (welcome) */
.promo-carousel {
  display: flex;
  gap: 12px;
  padding: 4px 20px 8px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
}
.promo-carousel::-webkit-scrollbar { display: none; }
.promo-slide {
  flex: 0 0 78%;
  scroll-snap-align: start;
  border-radius: 22px;
  border: 1.5px solid var(--ink);
  padding: 18px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  min-height: 168px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}
.promo-slide.dark { background: var(--ink); color: var(--bg); }
.promo-slide.fluo { background: var(--fluo); color: var(--ink); }
.promo-slide.coral { background: var(--coral); color: #fff; }
.promo-slide.bank {
  background: linear-gradient(155deg, #0a4a8f 0%, #1a6dc2 100%);
  color: #fff;
}
.promo-slide.bank .tag { background: #fff; color: #0a4a8f; }
.promo-slide.bank .arrow { background: #fff; color: #0a4a8f; border-color: #fff; }
.promo-slide.photo { color: var(--bg); }
.promo-slide .tag {
  position: absolute;
  top: 16px; left: 16px;
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  font-weight: 700;
  padding: 4px 8px;
  border-radius: 4px;
  background: var(--fluo);
  color: var(--ink);
}
.promo-slide.fluo .tag { background: var(--ink); color: var(--fluo); }
.promo-slide.coral .tag { background: #fff; color: var(--coral); }
.promo-slide h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 24px;
  letter-spacing: -0.02em;
  line-height: 0.95;
  margin: 0 0 4px;
}
.promo-slide p {
  margin: 0;
  font-size: 12px;
  opacity: 0.78;
  max-width: 80%;
}
.promo-slide .arrow {
  position: absolute;
  right: 16px; bottom: 16px;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.18);
  border: 1.5px solid currentColor;
  display: flex;
  align-items: center;
  justify-content: center;
}
.promo-slide.fluo .arrow { background: var(--ink); color: var(--fluo); border-color: var(--ink); }
.promo-slide.coral .arrow { background: #fff; color: var(--coral); border-color: #fff; }

/* tiny pagination dots under carousel */
.promo-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  padding: 4px 0 6px;
}
.promo-dots span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--line);
}
.promo-dots span.on { background: var(--ink); width: 16px; border-radius: 3px; }

/* Section header */
.section {
  padding: 16px 20px 8px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}
.section h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 22px;
  letter-spacing: -0.02em;
  margin: 0;
  line-height: 1;
}
.section .count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-faint);
  letter-spacing: 0.05em;
}

/* Category grid */
.cat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 4px 20px 20px;
}
.cat-card {
  position: relative;
  background: var(--paper-card);
  border: 1.5px solid var(--ink);
  border-radius: 18px;
  aspect-ratio: 1.05;
  cursor: pointer;
  overflow: hidden;
  transition: transform .15s;
  display: flex;
  flex-direction: column;
}
.cat-card:active { transform: scale(0.97); }

/* Featured: solid fluo block, no image */
.cat-card.featured {
  background: var(--fluo);
  border-color: var(--ink);
  padding: 14px;
  justify-content: space-between;
}
.cat-card.featured::after {
  content: '→';
  position: absolute;
  top: 12px; right: 14px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 22px;
  line-height: 1;
}
.cat-card.featured h4 { max-width: 80%; font-size: 26px; }

/* Photo cards: image top, label strip bottom */
.cat-card .cat-photo {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}
.cat-card .cat-photo.placeholder {
  background:
    repeating-linear-gradient(45deg, transparent 0 8px, rgba(0,0,0,0.06) 8px 9px),
    var(--bg-2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--ink-faint);
}
.cat-card .cat-icon {
  position: absolute;
  inset: 0;
  bottom: 38px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink);
}
.cat-card .cat-icon svg { width: 54px; height: 54px; }
.cat-card .cat-label {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  padding: 10px 12px 11px;
  background: var(--bg);
  border-top: 1.5px solid var(--ink);
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 8px;
}
.cat-card h4 {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.02em;
  line-height: 1;
  margin: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cat-card .meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-soft);
  letter-spacing: 0.05em;
  flex-shrink: 0;
}

/* Quick row (chips below welcome) */
.quick {
  display: flex;
  gap: 8px;
  padding: 0 20px 12px;
  overflow-x: auto;
}
.quick::-webkit-scrollbar { display: none; }
.quick .chip {
  white-space: nowrap;
  font-size: 12px;
  font-weight: 500;
  padding: 7px 12px;
  border: 1.5px solid var(--ink);
  border-radius: 999px;
  background: transparent;
  color: var(--ink);
  cursor: pointer;
}
.quick .chip.fluo {
  background: var(--fluo);
  border-color: var(--ink);
}
.quick .chip.solid {
  background: var(--ink);
  color: var(--bg);
}

/* Category-detail header */
.cat-hero {
  padding: 8px 20px 0;
}
.cat-hero .back {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-soft);
  letter-spacing: 0.05em;
  margin-bottom: 8px;
  cursor: pointer;
}
.cat-hero h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 42px;
  letter-spacing: -0.03em;
  line-height: 0.95;
  margin: 0;
}
.cat-hero .subline {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-soft);
  margin-top: 4px;
  letter-spacing: 0.05em;
}

/* Filter chips inside category */
.filters {
  display: flex;
  gap: 6px;
  padding: 14px 20px 6px;
  overflow-x: auto;
}
.filters::-webkit-scrollbar { display: none; }
.filters .f {
  white-space: nowrap;
  font-size: 12px;
  padding: 6px 10px;
  border: 1.5px solid var(--ink);
  border-radius: 999px;
  background: transparent;
  cursor: pointer;
}
.filters .f.on {
  background: var(--ink);
  color: var(--bg);
}

/* Plate list */
.plates {
  padding: 6px 20px 80px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.plate {
  background: var(--paper-card);
  border: 1.5px solid var(--ink);
  border-radius: 18px;
  padding: 12px;
  display: grid;
  grid-template-columns: 80px 1fr auto;
  gap: 12px;
  align-items: center;
  cursor: pointer;
  transition: transform .12s;
}
.plate:active { transform: scale(0.99); }
.plate .photo {
  width: 80px; height: 80px;
  border-radius: 12px;
  background:
    repeating-linear-gradient(45deg, transparent 0 6px, rgba(0,0,0,0.07) 6px 7px),
    var(--bg-2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  color: var(--ink-faint);
  text-align: center;
  line-height: 1.1;
  flex-shrink: 0;
  border: 1px solid var(--line);
}
.plate .body { min-width: 0; }
.plate .name {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 16px;
  letter-spacing: -0.01em;
  line-height: 1.1;
  margin: 0;
  display: flex;
  align-items: center;
  gap: 6px;
}
.plate .desc {
  font-size: 12px;
  color: var(--ink-soft);
  margin: 4px 0 0;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.plate .right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
}
.plate .price {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 13px;
  white-space: nowrap;
}
.plate .heart {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1.5px solid var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  background: var(--paper-card);
  transition: transform .12s, background .12s;
}
.plate .heart svg { width: 14px; height: 14px; }
.plate .heart.on {
  background: var(--coral);
  border-color: var(--coral);
}
.plate .heart.on svg { color: #fff; fill: #fff; }
.plate .heart:active { transform: scale(0.85); }

.tag {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.05em;
  font-weight: 700;
  padding: 2px 5px;
  border-radius: 3px;
}
.tag.promo { background: var(--coral); color: #fff; }
.tag.new { background: var(--fluo); color: var(--ink); }
.tag.veg { background: transparent; color: #2a7a40; border: 1px solid #2a7a40; }
.tag.sin_tacc { background: transparent; color: #b8861a; border: 1px solid #b8861a; }
.tag.spicy { background: transparent; color: var(--coral); border: 1px solid var(--coral); }
.tag.out { background: var(--ink-faint); color: #fff; }

/* Detail view */
.detail {
  display: flex;
  flex-direction: column;
  height: 100%;
}
.detail .hero {
  height: 320px;
  background:
    repeating-linear-gradient(45deg, transparent 0 12px, rgba(0,0,0,0.06) 12px 13px),
    var(--bg-2);
  border-bottom: 1.5px solid var(--ink);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-faint);
  letter-spacing: 0.1em;
  flex-shrink: 0;
}
.detail .hero .top-row {
  position: absolute;
  top: 16px; left: 20px; right: 20px;
  display: flex;
  justify-content: space-between;
}
.detail .hero .top-row .icon-btn {
  background: rgba(243,239,232,0.9);
  backdrop-filter: blur(6px);
}
.detail .hero .badges {
  position: absolute;
  bottom: 14px; left: 20px;
  display: flex;
  gap: 6px;
}
.detail .body {
  padding: 18px 20px 24px;
  flex: 1;
  overflow-y: auto;
}
.detail h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 32px;
  letter-spacing: -0.02em;
  line-height: 1;
  margin: 0;
}
.detail .price-big {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 22px;
  margin-top: 6px;
}
.detail .desc {
  margin-top: 14px;
  font-size: 14px;
  line-height: 1.5;
  color: var(--ink-soft);
}
.detail .meta-row {
  margin-top: 18px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.detail .meta-row .pill {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 5px 10px;
  border: 1.5px solid var(--ink);
  border-radius: 999px;
}
.detail .ings {
  margin-top: 22px;
}
.detail .ings h4 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
  margin: 0 0 8px;
  font-weight: 700;
}
.detail .ings ul {
  margin: 0;
  padding: 0;
  list-style: none;
}
.detail .ings li {
  font-size: 14px;
  padding: 8px 0;
  border-bottom: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
}

/* Bottom action bar (sticky) */
.bottom-action {
  padding: 14px 20px calc(14px + env(safe-area-inset-bottom));
  background: var(--bg);
  border-top: 1.5px solid var(--ink);
  display: flex;
  gap: 10px;
  align-items: center;
  flex-shrink: 0;
}
.btn {
  flex: 1;
  font: inherit;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 15px;
  letter-spacing: -0.01em;
  padding: 14px;
  border-radius: 999px;
  border: 1.5px solid var(--ink);
  background: var(--ink);
  color: var(--bg);
  cursor: pointer;
  transition: transform .12s;
}
.btn:active { transform: scale(0.97); }
.btn.fluo { background: var(--fluo); color: var(--ink); border-color: var(--ink); }
.btn.ghost { background: transparent; color: var(--ink); }

.back-to-menu {
  padding: 18px 16px 28px;
  display: flex;
  justify-content: center;
}
.back-to-menu .btn {
  width: 100%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.back-to-menu .btn svg { width: 16px; height: 16px; }

/* Bottom nav */
.bottom-nav {
  position: relative;
  background: var(--bg);
  border-top: 1.5px solid var(--ink);
  padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
  display: flex;
  justify-content: space-around;
  flex-shrink: 0;
}
.nav-btn {
  background: transparent;
  border: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 10px;
  cursor: pointer;
  color: var(--ink-soft);
  font: inherit;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.05em;
}
.nav-btn.on {
  color: var(--ink);
}
.nav-btn.on .nav-icon {
  background: var(--ink);
  color: var(--bg);
}
.nav-icon {
  width: 36px; height: 36px;
  border-radius: 12px;
  border: 1.5px solid var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
}

/* Welcome greeting block */
.greet {
  padding: 4px 20px 0;
}
.greet .hello {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--ink-soft);
  text-transform: uppercase;
}
.greet h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 38px;
  letter-spacing: -0.03em;

  <script type="text/babel">

// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',

    }}>

        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,

      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />

      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',

        ? '0 -2px 20px rgba(0,0,0,0.09)'

    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}

function normalizeApiMenu({ categories: apiCats, promotions: apiProms }) {
  const categories = apiCats.map(c => ({
    id: c.id,
    label: c.label,
    count: (c.items || []).length,
    featured: c.featured,
    imgUrl: c.image_url || null,
    imgPos: c.image_pos || 'center',
  }));

  const plates = {};
  apiCats.forEach(c => {
    plates[c.id] = (c.items || []).map(it => ({
      id: it.id,
      name: it.name,
      desc: it.description,
      price: it.price,
      tags: it.tags || [],
      category: c.id,
      imgUrl: it.image_url || null,
    }));
  });

  const promos = (apiProms || []).map(p => ({
    id: p.id,
    tag: p.tag,
    title: p.title,
    sub: p.subtitle,
    time: p.time_label,
    style: p.style,
    details: p.details || null,
  }));

  return { categories, plates, promos };
}

    plates: DEMO_PLATES,
    promos: DEMO_PROMOS,
    heroImg: DEMO_HERO_IMG,
    tenantName: 'NuMe',
    tenantLogoUrl: null,
    loading: false,
    error: null,
  });

  useEffect(() => {
    if (!API_BASE) return;
    setData(d => ({ ...d, loading: true, error: null }));
    fetch(`${API_BASE}/api/${slug}/menu`)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(json => {
        const normalized = normalizeApiMenu(json);
        setData({
          ...normalized,
          heroImg: DEMO_HERO_IMG,
          tenantName: json.tenant?.name || 'NuMe',
          tenantLogoUrl: json.tenant?.logo_url || null,
          loading: false,
          error: null,
        });
      })
      .catch(err => {
        console.warn('NuMe API no disponible, usando datos demo.', err);
        setData(d => ({ ...d, loading: false, error: err.message }));
      });
  }, [slug]);

  return data;
}

}

// ─────────── Tracker ───────────
// Acumula eventos en memoria y los envía al backend en lote cada 20s o al cerrar la página.
// Si no hay API_BASE configurado, los descarta silenciosamente.

const _tracker = (() => {
  let queue = [];
  let timer = null;

  function flush() {
    if (!API_BASE || queue.length === 0) { queue = []; return; }
    const slug = getTenantSlug();
    const batch = queue.splice(0, 50);
    // fire-and-forget
    fetch(`${API_BASE}/api/events`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug, events: batch }),
      keepalive: true,
    }).catch(() => {});
  }

  function schedule() {
    if (timer) return;
    timer = setTimeout(() => { timer = null; flush(); }, 20000);
  }

  if (typeof window !== 'undefined') {
    window.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') flush();
    });
    window.addEventListener('pagehide', flush);
  }

  return {
    track(type, payload = {}) {
      queue.push({ type, payload });
      schedule();
    },
    flush,
  };
})();

function useTracker() {
  return _tracker.track.bind(_tracker);
}

// ─────────── Router ───────────

function App() {
  const menuData = useMenuData();
  const track = useTracker();
  const [stack, setStack] = useState([{ screen: 'welcome' }]);
  const [favs, setFavs] = useState(() => {
    try {
      const s = localStorage.getItem('nume:favs');
      return s ? JSON.parse(s) : [];
    } catch { return []; }
  });
  const [toast, setToast] = useState('');
  const toastT = useRef();

  // menu_view al cargar
  useEffect(() => {
    if (menuData.loading) return;
    const params = new URLSearchParams(window.location.search);
    track('menu_view', { table_number: params.get('table') ? Number(params.get('table')) : null });
  }, [menuData.loading]);

  useEffect(() => {
    try { localStorage.setItem('nume:favs', JSON.stringify(favs)); } catch {}
  }, [favs]);

  const current = stack[stack.length - 1];

  function go(screen, payload) {
    if (screen === 'back') {
      setStack(s => s.length > 1 ? s.slice(0, -1) : s);
      return;
    }
    if (screen === 'welcome') {
      setStack([{ screen: 'welcome' }]);
      return;
    }
    // promo_click
    if (screen === 'promo') {
      const p = menuData.promos?.find(x => x.id === payload);
      if (p) track('promo_click', { promo_id: p.id, promo_title: p.title });
    }
    // item_view
    if (screen === 'detail') {
      const allPlates = Object.values(menuData.plates || {}).flat();
      const plate = allPlates.find(x => x.id === payload);
      if (plate) track('item_view', { item_id: plate.id, item_name: plate.name, category: plate.category });
    }
    setStack(s => [...s, { screen, payload }]);
  }

  function toggleFav(id) {
    setFavs(f => {
      const has = f.includes(id);
      if (!has) showToast('Guardado en favoritos');
      const allPlates = Object.values(menuData.plates || {}).flat();
      const plate = allPlates.find(x => x.id === id);
      track('favorite', { item_id: id, item_name: plate?.name, action: has ? 'remove' : 'add' });
      return has ? f.filter(x => x !== id) : [...f, id];
    });
  }

  function showToast(msg) {
    setToast(msg);
    clearTimeout(toastT.current);
    toastT.current = setTimeout(() => setToast(''), 1600);
  }

  function renderScreen() {
    const common = { go, favs, toggleFav, track };
    switch (current.screen) {
      case 'welcome':  return <WelcomeScreen {...common} />;
      case 'category': return <CategoryScreen catId={current.payload} {...common} />;
      case 'detail':   return <DetailScreen plateId={current.payload} {...common} />;
      case 'favs':     return <FavoritesScreen {...common} />;
      case 'promos':   return <PromosScreen {...common} />;
      case 'promo':    return <PromoDetailScreen promoId={current.payload} {...common} />;
      case 'search':   return <SearchScreen {...common} />;
      default:         return <WelcomeScreen {...common} />;
    }
  }

  return (
    <MenuCtx.Provider value={menuData}>
      <div style={{ position: 'fixed', inset: 0, background: 'var(--bg)', overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
        {menuData.loading ? (
          <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <Logo size="lg" />
          </div>
        ) : renderScreen()}
        <div className={'toast' + (toast ? ' show' : '')}>{toast}</div>
      </div>
    </MenuCtx.Provider>
  );
}
